server:
  port: 8080

spring:
  application:
    name: mdt-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mdt_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mdt:
  webrtc:
    room-prefix: mdt:room:
    route-prefix: mdt:route:
    session-ttl: 3600

logging:
  level:
    com.mdt: debug
    org.springframework.web.socket: debug
